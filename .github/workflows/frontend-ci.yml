name: Frontend CI Pipeline

# 1. When should this run? 
# We only want it to run when someone tries to merge into 'main'
on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    # 2. What kind of server do we need?
    runs-on: ubuntu-latest

    steps:
      # Step A: Get the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # The standard, stable version of Node
          cache: 'npm' # Makes future builds lightning fast

      # Step C: Install your packages
      - name: Install Dependencies
        run: npm ci # 'ci' is like 'install', but strictly follows your package-lock.json

      # Step D: Run the strict Vite/TypeScript build
      - name: Build the App
        # If this fails (like those unused variables earlier), the pipeline stops!
        run: npm run build